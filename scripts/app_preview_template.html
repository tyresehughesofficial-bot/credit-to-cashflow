<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TRIAD T ENTERPRISE — Command Center (Live Preview)</title>
<style>
:root{--bg:#0b0a08;--card:#161410;--card2:#1c1913;--border:#2a261c;--border2:#3e3928;--gold:#D4AF37;--gold-lite:#E6C65A;--text:#f2ede0;--dim:#c4b89a;--dimmer:#7d735c;--green:#3ecf6e;--red:#ff5b5b;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}html{color-scheme:dark}
body{font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;background-image:radial-gradient(80% 50% at 50% 0%,rgba(212,175,55,.06),transparent 60%);background-attachment:fixed}
.gold-text{background:linear-gradient(135deg,#F5E9BE,#D4AF37 45%,#A07D1F);-webkit-background-clip:text;background-clip:text;color:transparent}
.app{display:flex;min-height:100vh}
/* sidebar */
.sb{position:sticky;top:0;height:100vh;width:280px;flex:0 0 280px;border-right:1px solid var(--border);background:rgba(18,16,9,.5);display:flex;flex-direction:column;transition:width .3s ease,flex-basis .3s ease}
.sb.col{width:72px;flex-basis:72px}
.brand{position:relative;display:flex;align-items:center;gap:12px;height:64px;padding:0 16px;border-bottom:1px solid var(--border)}
.sb.col .brand{justify-content:center;padding:0 8px}
.logo{width:36px;height:36px;flex:0 0 36px;border-radius:10px;display:grid;place-items:center;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);padding:4px;box-shadow:0 0 0 1px rgba(212,175,55,.1),0 8px 30px -8px rgba(212,175,55,.25)}
.logo img{width:100%;height:100%;object-fit:contain}
.bword b{font-size:14px;display:block;letter-spacing:-.2px}.bword small{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dimmer)}
.sb.col .bword{display:none}
.edge{position:absolute;right:-12px;top:50%;transform:translateY(-50%);z-index:40;width:24px;height:24px;border-radius:999px;border:1px solid var(--border2);background:var(--card);color:var(--dim);display:grid;place-items:center;cursor:pointer;transition:.15s}
.edge:hover{color:var(--gold);border-color:rgba(212,175,55,.4)}.edge svg{width:14px;height:14px}
.nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px}.nav::-webkit-scrollbar{width:8px}.nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
.sb.col .nav{padding:8px 6px}
.group{margin-bottom:6px}
.ghead{display:flex;align-items:center;width:100%;gap:8px;padding:6px 10px;border:none;background:transparent;cursor:pointer;color:rgba(196,184,154,.7);font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;border-radius:6px;transition:.15s}
.ghead:hover{color:var(--dim)}.gname{flex:1;text-align:left}
.chev{width:14px;height:14px;transition:transform .3s ease;transform:rotate(-90deg)}.group.open .chev{transform:rotate(0)}
.gwrap{display:grid;grid-template-rows:0fr;opacity:0;transition:all .3s ease}.group.open .gwrap{grid-template-rows:1fr;opacity:1}
.ginner{overflow:hidden;padding-bottom:2px}
.item{position:relative;display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:9px;color:var(--dim);text-decoration:none;font-size:13.5px;transition:.15s;margin-bottom:1px;cursor:pointer}
.item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.item.active{background:rgba(212,175,55,.1);color:var(--gold)}
.item .ic{width:18px;height:18px;flex:0 0 18px}
.item .lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .bar{position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:9px;background:linear-gradient(135deg,#F5E9BE,#D4AF37,#A07D1F);opacity:0;transition:.15s}
.item.active .bar{opacity:1}
.crail{display:none;flex-direction:column;align-items:center;gap:4px;padding-bottom:8px;margin-bottom:6px;border-bottom:1px solid rgba(42,38,28,.6)}
.crail .item{width:40px;height:40px;justify-content:center;gap:0;padding:0}.crail .item .bar{left:2px}
.sb.col .ghead,.sb.col .gwrap{display:none}.sb.col .crail{display:flex}
.foot{border-top:1px solid var(--border);padding:14px 16px;font-size:10px;line-height:1.6;color:var(--dimmer)}
.sb.col .foot .full{display:none}.foot .mini{display:none}.sb.col .foot{text-align:center;color:rgba(212,175,55,.8);font-weight:700}.sb.col .foot .mini{display:block}
/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;background:rgba(11,10,8,.8);backdrop-filter:blur(14px);position:sticky;top:0;z-index:5}
.tsearch{flex:1;max-width:380px;position:relative}
.tsearch input{width:100%;height:38px;border-radius:10px;border:1px solid var(--border2);background:rgba(255,255,255,.02);color:var(--text);padding:0 12px 0 36px;font-size:13px}
.tsearch svg{position:absolute;left:11px;top:10px;width:16px;height:16px;color:var(--dimmer)}
.tright{margin-left:auto;display:flex;align-items:center;gap:10px}
.editbtn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 14px;border-radius:9px;border:1px solid var(--border2);background:rgba(255,255,255,.02);color:var(--dim);font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.editbtn:hover{color:var(--text)}
.editbtn.on{background:linear-gradient(135deg,#F5E9BE,#D4AF37 45%,#A07D1F);color:#1a1505;border-color:transparent}
.editbtn svg{width:15px;height:15px}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;background:rgba(255,177,40,.14);color:#ffce85}
.userchip{display:flex;align-items:center;gap:9px;border:1px solid var(--border);border-radius:99px;padding:4px 13px 4px 4px;background:rgba(22,20,16,.6)}
.avatar{width:28px;height:28px;border-radius:99px;background:rgba(212,175,55,.15);color:var(--gold);display:grid;place-items:center;font-size:11px;font-weight:700}
.userchip b{font-size:12px;display:block;line-height:1.2}.userchip small{font-size:10px;color:var(--dimmer);text-transform:capitalize}
.editbar{display:none;align-items:center;gap:10px;padding:9px 24px;border-bottom:1px solid var(--border);background:rgba(212,175,55,.06);font-size:12.5px;color:var(--gold-lite)}
body.editing .editbar{display:flex}
.content{padding:24px 26px 60px;max-width:1320px}
/* panels */
.panel{display:none}.panel.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.phead{display:flex;align-items:flex-start;gap:14px;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:22px}
.phead .hi{width:40px;height:40px;flex:0 0 40px;border-radius:11px;border:1px solid rgba(212,175,55,.3);background:rgba(212,175,55,.1);color:var(--gold);display:grid;place-items:center}
.phead .hic{width:20px;height:20px}
.phead h1{font-size:23px;letter-spacing:-.5px}.phead p{color:var(--dim);font-size:13.5px;margin-top:4px;max-width:640px}
.sec{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-weight:600;margin:26px 0 13px;display:flex;align-items:center;gap:8px}
.sec:before{content:"";width:6px;height:6px;border-radius:99px;background:var(--gold)}
.grid{display:grid;gap:16px;margin-bottom:4px}.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:2fr 1fr}
.metric{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);padding:18px}
.metric:before{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 50% 0%,rgba(212,175,55,.06),transparent 55%)}
.metric .lab{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--dimmer);font-weight:600;position:relative}
.mrow{display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px;position:relative}
.metric .val{font-size:24px;font-weight:800;letter-spacing:-.5px}
.delta{font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}.up{background:rgba(62,207,110,.15);color:var(--green)}.down{background:rgba(255,91,91,.15);color:var(--red)}
.metric .hint{font-size:11px;color:var(--dimmer);margin-top:6px;position:relative}
.card{border:1px solid var(--border);border-radius:var(--radius);background:var(--card)}
.ch{padding:18px 20px 0}.ch h3{font-size:15px}.ch p{font-size:12.5px;color:var(--dim);margin-top:3px}.cb{padding:18px 20px 20px}
.xax{display:flex;gap:10px;margin-top:8px}.xax span{flex:1;text-align:center;font-size:11px;color:var(--dimmer)}
.task{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border);border-radius:11px;background:rgba(255,255,255,.015);padding:11px 14px;margin-bottom:9px}
.task b{font-size:13px;font-weight:500;display:block}.task small{font-size:11.5px;color:var(--dimmer)}
.tag{font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px;white-space:nowrap}.tu{background:rgba(255,91,91,.15);color:var(--red)}.th{background:rgba(255,177,40,.16);color:#ffce85}.tm{background:rgba(255,255,255,.06);color:var(--dim)}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.fld{display:flex;flex-direction:column;gap:6px}.fld span{font-size:11.5px;color:var(--dimmer);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.inp{border:1px solid var(--border2);background:rgba(255,255,255,.02);border-radius:9px;padding:10px 12px;font-size:13.5px;color:var(--text);min-height:40px}
.btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 18px;border-radius:10px;border:none;font-size:13.5px;font-weight:700;cursor:pointer;color:#1a1505;background:linear-gradient(135deg,#F5E9BE,#D4AF37 45%,#A07D1F);box-shadow:0 0 0 1px rgba(212,175,55,.18),0 8px 30px -8px rgba(212,175,55,.25)}
.btn.sm{height:36px;padding:0 14px;font-size:12.5px}
.out{border:1px solid var(--border2);background:rgba(212,175,55,.03);border-radius:10px;padding:15px 16px;font-size:14px;line-height:1.65;color:var(--text)}
.ring{display:flex;justify-content:center;position:relative}.ringc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}.ringc b{font-size:30px;font-weight:800;display:block}.ringc small{font-size:11px;color:var(--green);font-weight:700}
.bars{display:flex;flex-direction:column;gap:13px}.brow{display:grid;grid-template-columns:130px 1fr;align-items:center;gap:12px;font-size:13px;color:var(--dim)}
.track{height:8px;border-radius:99px;background:#23201a;overflow:hidden}.track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#A07D1F,#D4AF37)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}.tbl th{text-align:left;color:var(--dimmer);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:0 14px 11px;border-bottom:1px solid var(--border)}
.tbl td{padding:13px 14px;border-bottom:1px solid var(--border);color:var(--text)}.tbl tbody tr:last-child td{border:none}.tbl tbody tr:hover{background:rgba(255,255,255,.015)}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;background:rgba(212,175,55,.12);color:var(--gold);margin:0 20px 0}
.hooktext{padding:0 20px 4px;font-size:14px;color:var(--text);line-height:1.5}
.searchbar{display:flex;align-items:center;gap:10px}.searchbar>span{color:var(--dimmer)}.searchbar .inp{flex:1}
.chk{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--dim);margin-bottom:11px}.chk span:first-child{color:var(--green);font-weight:800}
.steps{display:flex;flex-direction:column;gap:12px}.step{display:flex;align-items:center;gap:11px;font-size:13.5px;color:var(--dim)}
.step i{width:24px;height:24px;border-radius:99px;border:1px solid rgba(212,175,55,.3);background:rgba(212,175,55,.1);color:var(--gold);display:grid;place-items:center;font-size:11px;font-weight:700;font-style:normal}
/* edit mode */
body.editing .editable{outline:1px dashed rgba(212,175,55,.35);outline-offset:3px;border-radius:3px;transition:outline .15s}
body.editing .editable:hover{outline-color:rgba(212,175,55,.7)}
body.editing .editable:focus{outline:1px solid var(--gold);background:rgba(212,175,55,.05)}
@media(max-width:1024px){.sb{display:none}.g4{grid-template-columns:1fr 1fr}.g2,.g3,.formgrid{grid-template-columns:1fr}}
</style></head><body>
<div class="app">
  <aside class="sb" id="sb">
    <div class="brand">
      <div class="logo"><img src="__LOGO__" alt="TRIAD T"/></div>
      <div class="bword"><b class="gold-text">TRIAD T</b><small>Command Center</small></div>
      <button class="edge" onclick="col()" title="Collapse / expand"><svg id="edgeic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    </div>
    <nav class="nav">__GROUPS__</nav>
    <div class="foot"><span class="full">TRIAD T ENTERPRISE&trade;<br/>AI Command Center &middot; v1.0</span><span class="mini">T</span></div>
  </aside>
  <div class="main">
    <header class="top">
      <div class="tsearch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search modules, clients, knowledge..." oninput="search(this.value)"/></div>
      <div class="tright">
        <button class="editbtn" id="editbtn" onclick="edit()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg><span>Edit</span></button>
        <span class="pill">Live preview</span>
        <div class="userchip"><div class="avatar">TH</div><div><b>Tyrese Hughes</b><small>owner</small></div></div>
      </div>
    </header>
    <div class="editbar">✎ Edit mode on — click any text to change it. Your edits stay in this browser tab. Click <b>&nbsp;Edit&nbsp;</b> again to lock.</div>
    <div class="content">__PANELS__</div>
  </div>
</div>
<script>
function tg(b){b.parentElement.classList.toggle('open');}
function col(){var s=document.getElementById('sb');s.classList.toggle('col');document.getElementById('edgeic').innerHTML=s.classList.contains('col')?'<path d="m9 18 6-6-6-6"/>':'<path d="m15 18-6-6 6-6"/>';}
function go(slug){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id==='p-'+slug);});
  document.querySelectorAll('.item').forEach(function(i){i.classList.toggle('active',i.dataset.go===slug);});
  document.querySelector('.content').scrollTo&&window.scrollTo(0,0);
  syncEdit();
}
document.querySelectorAll('.item').forEach(function(i){i.addEventListener('click',function(){go(i.dataset.go);});});
function syncEdit(){var on=document.body.classList.contains('editing');document.querySelectorAll('.panel.active .editable').forEach(function(e){e.contentEditable=on;});}
function edit(){var on=document.body.classList.toggle('editing');document.getElementById('editbtn').classList.toggle('on',on);document.querySelectorAll('.editable').forEach(function(e){e.contentEditable=on;});}
function search(q){q=q.trim().toLowerCase();document.querySelectorAll('.group').forEach(function(g){var any=false;g.querySelectorAll('.ginner .item').forEach(function(it){var m=!q||it.textContent.toLowerCase().indexOf(q)>-1;it.style.display=m?'':'none';if(m)any=true;});if(q){g.classList.add('open');g.style.display=any?'':'none';}else{g.style.display='';}});}
</script>
</body></html>
