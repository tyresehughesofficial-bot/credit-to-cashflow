name: Deploy preview to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          PAGES_EXPORT: "true"
          # Public Supabase values (anon key is safe to expose). Add these as repo
          # secrets so the static site can call the generate-image Edge Function.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      - run: touch out/.nojekyll
      - name: Add 404 → Command Center fallback
        run: |
          cat > out/404.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=/credit-to-cashflow/command-center/">
          <link rel="canonical" href="/credit-to-cashflow/command-center/">
          <title>TRIAD T — Command Center</title></head>
          <body style="background:#0b0a08;color:#D4AF37;font-family:system-ui;text-align:center;padding:3rem">
          Redirecting to the Command Center… <a style="color:#E6C65A" href="/credit-to-cashflow/command-center/">Open it</a>.
          </body></html>
          HTML
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
